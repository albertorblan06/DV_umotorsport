[platformio]
src_dir = main

[env:esp32dev]
platform = espressif32@6.4.0
board = esp32dev
framework = espidf
monitor_speed = 460800
upload_speed = 115200

board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.f_flash = 40000000

